<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrabPack ✋ Final Showcase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; touch-action: none; }
        canvas { display: block; }
        #reticle { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; }
        .grab-btn { position: absolute; width: 75px; height: 75px; border-radius: 50%; border: 3px solid white; z-index: 1000; display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-weight: bold; font-size: 22px; color: white; user-select: none; }
        #btn-left { bottom: 120px; right: 25px; background: rgba(0, 85, 255, 0.8); }
        #btn-right { bottom: 25px; right: 120px; background: rgba(255, 0, 0, 0.8); }
        #joystick-area { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; z-index: 1000; } 
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif; }
        #start-btn { padding: 15px 35px; font-size: 18px; background: #ff0000; color: #fff; border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="reticle"></div>
    <div id="overlay">
        <h2>GRABPACK FINAL ✋</h2>
        <p>Suara, Tarik Kardus & Puzzle 2 Tangan</p>
        <button id="start-btn">MULAI (Landscape)</button>
    </div>
    <div id="btn-left" class="grab-btn">L</div>
    <div id="btn-right" class="grab-btn">R</div>
    <div id="joystick-area"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001100);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000);
        camera.rotation.order = 'YXZ'; 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        scene.add(new THREE.GridHelper(100, 50, 0x00ff00, 0x003300));

        // --- AUDIO SYSTEM (zap.mp3) ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const soundZap = new THREE.Audio(listener);
        const audioLoader = new THREE.AudioLoader();
        audioLoader.load('zap.mp3', (buffer) => {
            soundZap.setBuffer(buffer);
            soundZap.setVolume(1.0);
        });

        // --- TEXTURE LOADER ---
        const texLoader = new THREE.TextureLoader();
        const kardusTex = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/crate.gif');

        // --- MODEL TANGAN ✋ ---
        function createHand(color, side) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const palm = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.08), mat);
            group.add(palm);
            [-0.13, -0.04, 0.04, 0.13].forEach(x => {
                const f = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.35, 0.07), mat);
                f.position.set(x, 0.35, 0); group.add(f);
            });
            const thumb = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.22, 0.07), mat);
            thumb.position.set(side === "left" ? 0.22 : -0.22, 0.1, 0);
            group.add(thumb);

            const rope = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 1), new THREE.MeshBasicMaterial({color: 0x000000}));
            rope.visible = false;
            scene.add(rope);

            const idlePos = new THREE.Vector3(side === "left" ? -0.8 : 0.8, -0.5, -1.0);
            scene.add(group); 
            return { group, rope, side, active: false, timer: 0, targetW: new THREE.Vector3(), idlePos, grabbedObj: null };
        }

        const leftH = createHand(0x0055ff, "left");
        const rightH = createHand(0xff0000, "right");

        // --- OBJEK DUNIA ---
        const interactables = [];

        // 1. Pintu Lama (Kiri - 1 Tangan)
        const door1 = new THREE.Mesh(new THREE.BoxGeometry(4, 7, 0.5), new THREE.MeshStandardMaterial({color: 0x444444}));
        door1.position.set(-6, 3.5, -12); scene.add(door1);
        const scanner1 = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 0.2), new THREE.MeshBasicMaterial({color: 0x0055ff}));
        scanner1.position.set(-9, 2, -11.7); scene.add(scanner1);
        interactables.push(scanner1);
        let door1Open = false;

        // 2. Pintu Baru (Kanan - Puzzle 2 Tangan)
        const door2 = new THREE.Mesh(new THREE.BoxGeometry(5, 7, 0.5), new THREE.MeshStandardMaterial({color: 0x552222}));
        door2.position.set(6, 3.5, -12); scene.add(door2);
        const scanner2Blue = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 0.2), new THREE.MeshBasicMaterial({color: 0x0055ff}));
        scanner2Blue.position.set(2.5, 2, -11.7); scene.add(scanner2Blue);
        const scanner2Red = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 0.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
        scanner2Red.position.set(9.5, 2, -11.7); scene.add(scanner2Red);
        interactables.push(scanner2Blue, scanner2Red);
        let d2BlueHit = false, d2RedHit = false, door2Open = false;

        // 3. Kardus (Bisa Ditarik)
        const kardus = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshStandardMaterial({map: kardusTex}));
        kardus.position.set(0, 0.75, -7); scene.add(kardus);
        interactables.push(kardus);

        // --- KONTROL & RAYCASTING ---
        let joystickPos = { x: 0, y: 0 };
        let yaw = 0, pitch = 0, tStart = { x: 0, y: 0 };

        nipplejs.create({ zone: document.getElementById('joystick-area'), mode: 'static', position: {left:'75px', bottom:'75px'} })
        .on('move', (e, d) => { joystickPos = d.vector; })
        .on('end', () => { joystickPos = { x: 0, y: 0 }; });

        document.addEventListener('touchstart', (e) => { tStart.x = e.touches[0].pageX; tStart.y = e.touches[0].pageY; });
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('#joystick-area') || e.target.closest('.grab-btn') || e.target.closest('.nipple')) return;
            yaw -= (e.touches[0].pageX - tStart.x) * 0.005;
            pitch = Math.max(-1.4, Math.min(1.4, pitch - (e.touches[0].pageY - tStart.y) * 0.005));
            tStart.x = e.touches[0].pageX; tStart.y = e.touches[0].pageY;
        }, {passive: false});

        function shoot(h) {
            if (h.active) return;
            
            // Putar Suara Zap
            if (soundZap.buffer) {
                if (soundZap.isPlaying) soundZap.stop();
                soundZap.play();
            }

            h.active = true; h.timer = 0; h.grabbedObj = null; h.isHit = false;
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const ray = new THREE.Raycaster(camera.position, dir);
            
            const hits = ray.intersectObjects(interactables);
            if(hits.length > 0) {
                const hitObj = hits[0].object;
                h.targetW.copy(hits[0].point);
                h.isHit = true;

                // Logika Interaksi
                if (h.side === "left" && hitObj === scanner1) {
                    hitObj.material.color.set(0x00ff00); door1Open = true;
                }
                else if (h.side === "left" && hitObj === scanner2Blue) {
                    hitObj.material.color.set(0x00ff00); d2BlueHit = true;
                }
                else if (h.side === "right" && hitObj === scanner2Red) {
                    hitObj.material.color.set(0x00ff00); d2RedHit = true;
                }
                else if (h.side === "right" && hitObj === kardus) {
                    h.grabbedObj = kardus; // Pegang kardus
                }
            } else {
                h.targetW.copy(camera.position.clone().add(dir.multiplyScalar(15)));
            }
        }

        document.getElementById('btn-left').ontouchstart = (e) => { e.preventDefault(); shoot(leftH); };
        document.getElementById('btn-right').ontouchstart = (e) => { e.preventDefault(); shoot(rightH); };

        // --- ANIMASI ---
        function updateH(h) {
            const shoulderW = h.idlePos.clone().applyMatrix4(camera.matrixWorld);
            if (!h.active) {
                h.group.position.copy(shoulderW);
                h.group.quaternion.copy(camera.quaternion);
                h.rope.visible = false;
                if (h.grabbedObj) h.grabbedObj = null; // Lepas saat kembali
                return;
            }

            h.timer += 0.07;
            let p = (h.timer < 1) ? h.timer : (h.timer < 1.3) ? 1 : Math.max(0, 1 - (h.timer - 1.3));
            const curW = new THREE.Vector3().lerpVectors(shoulderW, h.targetW, p);
            h.group.position.copy(curW);
            h.group.quaternion.copy(camera.quaternion);
            
            // Logika Menarik Kardus
            if (h.timer > 1.3 && h.grabbedObj) {
                h.grabbedObj.position.x = curW.x;
                h.grabbedObj.position.z = curW.z;
                // Posisi Y tetap agar kardus bergeser di lantai
            }

            // Tali
            const ropeVec = curW.clone().sub(shoulderW);
            h.rope.visible = true;
            h.rope.scale.set(1, 1, ropeVec.length() || 0.1);
            h.rope.position.copy(shoulderW.clone().add(ropeVec.multiplyScalar(0.5)));
            h.rope.lookAt(curW);
            
            if (h.timer >= 2.3) h.active = false;
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(pitch, yaw, 0);

            // Gerakan
            const speed = 0.15;
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0));

            camera.position.add(forward.multiplyScalar(joystickPos.y * speed));
            camera.position.add(right.multiplyScalar(joystickPos.x * speed));
            camera.position.y = 1.6;

            // Puzzle Pintu 2 Tangan
            if (d2BlueHit && d2RedHit) door2Open = true;

            // Buka Pintu
            if(door1Open && door1.position.y < 10) door1.position.y += 0.06;
            if(door2Open && door2.position.y < 10) door2.position.y += 0.06;

            updateH(leftH); updateH(rightH);
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = () => {
            if (THREE.AudioContext.getContext().state === 'suspended') {
                THREE.AudioContext.getContext().resume();
            }
            document.getElementById('overlay').style.display = 'none';
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            animate();
        };

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
